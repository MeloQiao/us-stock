name: HF Space Keepalive

on:
  schedule:
    - cron: '*/30 * * * *'  # 每 30 分钟 ping 一次，防止 Space 休眠
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping HF Space
        run: |
          URL="https://meloqiao-us-stock.hf.space"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$URL")
          echo "HF Space ping → HTTP $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ]; then
            echo "✅ Space is alive"
          else
            echo "⚠️ Space returned $STATUS — may be building or sleeping"
          fi
