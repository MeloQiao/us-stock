name: Optimize Strategy Weights

# Runs weekly (Sunday 02:00 UTC) + can be triggered manually
# Computes regime-specific strategy weights from 5-year historical data
# and saves results to HF Dataset for the daily pipeline to consume.

on:
  schedule:
    - cron: "0 2 * * 0"   # every Sunday 02:00 UTC
  workflow_dispatch:
    inputs:
      market:
        description: "Market to optimize (us | hk | cn | all)"
        required: false
        default: "all"

jobs:
  optimize:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weight optimizer
        env:
          HF_TOKEN:          ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO:   ${{ secrets.HF_DATASET_REPO }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          MARKET="${{ github.event.inputs.market || 'all' }}"
          echo "Optimizing weights for market: $MARKET"
          python -m strategies.walk_forward_optimizer --market "$MARKET"

      - name: Notify Feishu on failure
        if: failure()
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          python - <<'EOF'
          import os, httpx
          url = os.getenv("FEISHU_WEBHOOK_URL", "")
          if url:
              httpx.post(url, json={
                  "msg_type": "text",
                  "content": {"text": "[US Stock Monitor] ⚠️ 策略权重优化任务失败，请检查 GitHub Actions 日志"}
              }, timeout=10)
          EOF
