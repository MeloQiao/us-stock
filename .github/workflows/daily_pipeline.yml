name: Daily Signal Pipeline

on:
  schedule:
    # US  — 21:30 UTC = 16:30 ET (美股收盘后)
    - cron: '30 21 * * 1-5'
    # HK  — 08:30 UTC = 16:30 HKT (港股收盘后)
    - cron: '30 8 * * 1-5'
    # CN  — 07:30 UTC = 15:30 CST (A股收盘后)
    - cron: '30 7 * * 1-5'
  workflow_dispatch:
    inputs:
      market:
        description: 'Market to run (us / hk / cn / all)'
        required: false
        default: 'all'

jobs:
  us-pipeline:
    name: US Market Pipeline
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: >
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.market == 'us' || github.event.inputs.market == 'all') ||
      github.event_name == 'schedule' && startsWith(github.event.schedule, '30 21')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run US pipeline
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          python -c "
          import json
          from scheduler.jobs import run_daily_pipeline
          result = run_daily_pipeline('us')
          print(json.dumps(result, indent=2, default=str))
          if result['errors']:
              print('ERRORS:', result['errors'])
              exit(1)
          "

  hk-pipeline:
    name: HK Market Pipeline
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: >
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.market == 'hk' || github.event.inputs.market == 'all') ||
      github.event_name == 'schedule' && startsWith(github.event.schedule, '30 8')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run HK pipeline
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          python -c "
          import json
          from scheduler.jobs import run_daily_pipeline
          result = run_daily_pipeline('hk')
          print(json.dumps(result, indent=2, default=str))
          if result['errors']:
              print('ERRORS:', result['errors'])
              exit(1)
          "

  cn-pipeline:
    name: CN Market Pipeline
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: >
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.market == 'cn' || github.event.inputs.market == 'all') ||
      github.event_name == 'schedule' && startsWith(github.event.schedule, '30 7')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run CN pipeline
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          python -c "
          import json
          from scheduler.jobs import run_daily_pipeline
          result = run_daily_pipeline('cn')
          print(json.dumps(result, indent=2, default=str))
          if result['errors']:
              print('ERRORS:', result['errors'])
              exit(1)
          "
      - name: Commit updated portfolio state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add paper_trade/cn_virtual.json
          git diff --cached --quiet || git commit -m "chore: auto-update CN virtual portfolio [skip ci]"
          git push
